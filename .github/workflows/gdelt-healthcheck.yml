name: GDELT Feed Healthcheck

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # no external deps yet, but leave hook for future

      - name: Run GDELT healthcheck
        working-directory: tools
        run: |
          python gdelt_healthcheck.py
